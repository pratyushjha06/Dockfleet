<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>DockFleet Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <!-- Alpine -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body 
    class="bg-gradient-to-br from-gray-100 to-gray-200 
           dark:from-gray-900 dark:to-gray-950
           text-gray-800 dark:text-gray-100 
           min-h-screen transition-colors duration-500"
    x-data="dashboard()"
    x-init="fetchServices()"
>

<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-bold">DockFleet</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Local self-healing orchestrator
            </p>
        </div>
        
        <button 
            @click="toggleDarkMode()" 
            class="px-4 py-2 rounded-xl bg-gray-800 text-white dark:bg-gray-700 hover:scale-105 transition">
            Toggle Theme
        </button>
    </div>
    
    <div class="grid grid-cols-3 gap-4 mb-8 text-center">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
            <p class="text-sm text-gray-500">Total Services</p>
            <p class="text-2xl font-bold" x-text="summary.total_services"></p>
        </div>
        
        <div class="bg-green-100 dark:bg-green-900 p-4 rounded-xl shadow">
            <p class="text-sm">Running</p>
            <p class="text-2xl font-bold text-green-600 dark:text-green-300" 
            x-text="summary.running"></p>
        </div>
        
        <div class="bg-red-100 dark:bg-red-900 p-4 rounded-xl shadow">
            <p class="text-sm">Unhealthy</p>
            <p class="text-2xl font-bold text-red-600 dark:text-red-300" 
            x-text="summary.unhealthy"></p>
        </div>
    </div>

       <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <template x-for="service in services" :key="service.name">
            <div class="bg-white dark:bg-gray-800 
                        p-6 rounded-2xl shadow-xl 
                        border border-gray-200 dark:border-gray-700
                        hover:shadow-2xl transition duration-300">

                <!-- Header Row -->
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold capitalize"
                        x-text="service.name"></h2>

                    <span 
                        :class="{
                            'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300': service.status === 'running',
                            'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-300': service.status === 'restarting',
                            'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300': service.status === 'stopped'
                        }"
                        class="px-3 py-1 text-xs font-semibold rounded-full capitalize">
                        <span x-text="service.status"></span>
                    </span>
                </div>


                <!-- CPU Bar -->
                <div class="mb-4">
                    <p class="text-sm text-gray-500 mb-1">
                        CPU Usage (<span x-text="service.cpu"></span>%)
                    </p>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                        <div class="bg-blue-500 h-2 rounded-full transition-all duration-500"
                             :style="'width:' + service.cpu + '%'">
                        </div>
                    </div>
                </div>


                <!-- Metrics -->
                <div class="space-y-2 text-sm">
                    <p><strong>Memory:</strong> <span x-text="service.memory"></span> MB</p>
                    <p><strong>Uptime:</strong> <span x-text="service.uptime"></span></p>
                    <p><strong>Restarts:</strong> <span x-text="service.restart_count"></span></p>
                    <p>
                        <strong>Health:</strong> 
                        <span 
                            :class="{
                                'text-green-600 dark:text-green-300': service.health_status === 'healthy',
                                'text-yellow-600 dark:text-yellow-300': service.health_status === 'degraded',
                                'text-red-600 dark:text-red-300': service.health_status === 'unhealthy'
                            }"
                            class="font-semibold capitalize"
                            x-text="service.health_status">
                        </span>
                    </p>
                </div>


                <!-- Buttons -->
                <div class="mt-6 flex gap-4">
                    <button 
                        @click="restartService(service.name)"
                        class="flex-1 bg-yellow-500 text-black px-3 py-2 
                               rounded-lg hover:bg-yellow-400 transition">
                        Restart
                    </button>

                    <button 
                        @click="stopService(service.name)"
                        class="flex-1 bg-red-600 text-white px-3 py-2 
                               rounded-lg hover:bg-red-500 transition">
                        Stop
                    </button>
                </div>

            </div>
        </template>

    </div>

</div>
<script>
function dashboard() {
    return {
        services: [],
        summary: {},
        darkMode: true,

        async fetchServices() {
            const res = await fetch('/services');
            this.services = await res.json();
        },

        async fetchSummary() {
            const res = await fetch('/status');
            this.summary = await res.json();
        },

        async init() {
            await this.fetchServices();
            await this.fetchSummary();
        },

        restartService(name) {
            console.log("Restart clicked:", name);
        },

        stopService(name) {
            console.log("Stop clicked:", name);
        },

        toggleDarkMode() {
            this.darkMode = !this.darkMode;
            document.documentElement.classList.toggle('dark');
        }
    }
}
</script>

</body>
</html>
