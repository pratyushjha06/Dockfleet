<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DockFleet Dashboard</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <!-- Alpine -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

</head>
<style>
    .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid white;
        border-top: 2px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        100% {
            transform: rotate(360deg);
        }
    }
</style>

<body class="bg-gradient-to-br from-gray-100 to-gray-200
           dark:from-gray-900 dark:to-gray-800
           text-gray-900 dark:text-white
           min-h-screen transition-all duration-300" x-data="dashboard()" x-init="init()">

    <div class="container mx-auto px-6 py-10">

        <!-- NAVBAR -->
        <div class="flex justify-between items-center mb-10">

            <div>
                <h1 class="text-4xl font-bold">DockFleet</h1>
                <span class="ml-3 px-3 py-1 text-xs font-semibold rounded-full
             bg-blue-100 text-blue-800
             dark:bg-blue-900 dark:text-blue-200">

                    Self-Healing Enabled

                </span>
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Local Self-Healing Orchestrator
                </p>
            </div>

            <button @click="toggleDarkMode()"
                class="px-4 py-2 rounded-xl bg-gray-800 text-white dark:bg-gray-700 hover:scale-105 transition">
                Toggle Theme
            </button>

        </div>

        <!-- STATUS LEGEND -->
        <div class="flex gap-6 mb-8 text-sm items-center">

            <span class="font-semibold">Status Legend:</span>

            <span class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                Healthy
            </span>

            <span class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-orange-500"></span>
                Restarting
            </span>

            <span class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                Stopped
            </span>

        </div>

        <!-- SUMMARY STRIP -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 text-center">

            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg">
                <p class="text-sm text-gray-500">Total Services</p>
                <p class="text-3xl font-bold mt-1" x-text="summary.total_services"></p>
            </div>

            <div class="bg-green-100 dark:bg-green-900/40 p-6 rounded-2xl shadow-lg">
                <p class="text-sm">Running</p>
                <p class="text-3xl font-bold text-green-600 dark:text-green-300 mt-1" x-text="summary.running"></p>
            </div>

            <div class="bg-red-100 dark:bg-red-900/40 p-6 rounded-2xl shadow-lg">
                <p class="text-sm">Stopped</p>
                <p class="text-3xl font-bold text-red-600 dark:text-red-300 mt-1" x-text="summary.stopped"></p>
            </div>

            <div class="bg-orange-100 dark:bg-orange-900/40 p-6 rounded-2xl shadow-lg">
                <p class="text-sm">Restarting</p>
                <p class="text-3xl font-bold text-orange-600 dark:text-orange-300 mt-1" x-text="summary.restarting"></p>
            </div>

        </div>


        <!-- SERVICES GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            <template x-for="service in services" :key="service.name">

                <div class="bg-white dark:bg-gray-800
                        p-6 rounded-2xl shadow-xl
                        border border-gray-200 dark:border-gray-700
                        hover:shadow-2xl transition duration-300">

                    <!-- Header -->
                    <div class="flex justify-between items-center mb-4">

                        <h2 class="text-xl font-semibold capitalize" x-text="service.name"></h2>

                        <template x-if="service.restart_count > 0 && service.health_status === 'healthy'">
                            <span class="ml-2 text-xs px-2 py-1 rounded
             bg-purple-200 text-purple-800
             dark:bg-purple-900 dark:text-purple-200">

                                Recently Restarted

                            </span>
                        </template>

                        <span class="px-2 py-1 rounded text-xs font-semibold capitalize" :class="{
                            'bg-green-600 text-white': service.status === 'running',
                            'bg-red-600 text-white': service.status === 'stopped',
                            'bg-yellow-500 text-black': service.status === 'restarting',
                            'bg-gray-500 text-white': service.status === 'unknown'
                        }" x-text="service.status"></span>

                        <span class="px-2 py-1 rounded text-xs font-semibold capitalize flex items-center gap-1" :class="{
    'bg-green-500 text-white': service.health_status === 'healthy',
    'bg-orange-500 text-white': service.health_status === 'restarting',
    'bg-red-500 text-white animate-pulse': service.health_status === 'unhealthy',
    'bg-gray-500 text-white': service.health_status === 'unknown'
}">

                            <span x-text="service.health_status"></span>

                            <!-- Spinner for restarting -->
                            <template x-if="service.health_status === 'restarting'">
                                <span class="spinner"></span>
                            </template>

                        </span>

                    </div>


                    <!-- SERVICE DETAILS -->
                    <div class="space-y-2 text-sm">



                        <p>
                            <strong>Image:</strong>
                            <span x-text="service.image"></span>
                        </p>

                        <p>
                            <strong>Ports:</strong>
                            <span x-text="service.ports"></span>
                        </p>

                        <p>
                            <strong>CPU Usage:</strong>
                            <span x-text="service.cpu"></span>
                        </p>

                        <p>
                            <strong>Memory Usage:</strong>
                            <span x-text="service.memory"></span>
                        </p>

                        <p>
                            <strong>Uptime:</strong>
                            <span x-text="service.uptime"></span>
                        </p>

                        <p>
                            <strong>Restart Policy:</strong>

                            <span class="bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded text-xs"
                                x-text="service.restart_policy">
                            </span>

                        </p>

                        <p>
                            <strong>Restart Count:</strong>
                            <span class="px-3 py-1 rounded text-sm font-bold" :class="{
                                    'bg-gray-200 dark:bg-gray-700': service.restart_count == 0,
                                    'bg-orange-400 text-black animate-pulse': service.restart_count > 0
                                }" x-text="service.restart_count">
                            </span>
                        </p>

                        <p class="text-xs text-gray-500 dark:text-gray-400">
                            Last Check:
                            <span x-text="formatTime(service.last_health_check)"></span>
                        </p>

                    </div>


                    <!-- ACTION BUTTONS -->
                    <div class="mt-6 flex gap-4">

                        <button @click="restartService(service.name)" class="flex-1 bg-yellow-500 text-black px-3 py-2
                               rounded-lg hover:bg-yellow-400 transition">

                            Restart

                        </button>

                        <button @click="stopService(service.name)" class="flex-1 bg-red-600 text-white px-3 py-2
                               rounded-lg hover:bg-red-500 transition">

                            Stop

                        </button>

                    </div>

                </div>

            </template>

        </div>

        <!-- LOG VIEWER -->
        <div class="mt-16">

            <h2 class="text-2xl font-bold mb-4">Live Service Logs</h2>

            <div class="flex gap-4 mb-4">

                <!-- Service Selector -->
                <select x-model="selectedService" class="px-3 py-2 rounded bg-gray-200 dark:bg-gray-700">

                    <option value="">Select Service</option>

                    <template x-for="service in services">
                        <option :value="service.name" x-text="service.name"></option>
                    </template>

                </select>

                <button @click="connectLogs()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">

                    Start Logs
                </button>

                <button @click="disconnectLogs()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-500">
                    Stop
                </button>

                <button @click="clearLogs()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-500">

                    Clear Logs
                </button>

                <button @click="toggleScroll()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-500">
                    Toggle Auto Scroll
                </button>

            </div>

            <div x-ref="logBox" class="bg-black text-green-400 font-mono text-xs p-4 rounded-xl
                h-72 overflow-y-auto border border-gray-700">

                <template x-for="line in logs">
                    <div x-text="line"></div>
                </template>
            </div>

        </div>

    </div>



    <script>

        function dashboard() {

            return {

                services: [],
                summary: {},

                selectedService: "",
                logSource: null,
                logs: [],
                autoScroll: true,

                async init() {
                    
                    await this.fetchServices()
                    await this.fetchSummary()
                    setInterval(() => {
                        this.fetchServices()
                        this.fetchSummary()
                    }, 5000)
                
                },

                async fetchServices() {

                    try {

                        const res = await fetch("/services")
                        this.services = await res.json()

                    } catch (err) {

                        console.error("Failed loading services", err)

                    }



                },

                async fetchSummary() {

                    try {

                        const res = await fetch("/status")
                        this.summary = await res.json()

                    } catch (err) {

                        console.error("Failed loading summary", err)

                    }

                },

                async restartService(name) {

                    try {

                        const res = await fetch(`/services/${name}/restart`, {
                            method: "POST"
                        })

                        const data = await res.json()

                        alert(data.message)

                        await this.fetchServices()
                        await this.fetchSummary()

                    } catch (err) {

                        console.error("Restart failed", err)

                    }

                },

                async stopService(name) {

                    try {

                        const res = await fetch(`/services/${name}/stop`, {
                            method: "POST"
                        })

                        const data = await res.json()

                        alert(data.message)

                        await this.fetchServices()
                        await this.fetchSummary()

                    } catch (err) {

                        console.error("Stop failed", err)

                    }

                },

                connectLogs() {

                    if (!this.selectedService) return

                    // close old connection
                    if (this.logSource) {
                        this.logSource.close()
                    }

                    this.logs = []

                    this.logSource = new EventSource(`/logs/${this.selectedService}`)

                    this.logSource.onmessage = (event) => {

                        this.logs.push(event.data)
                        this.$nextTick(() => {
                            if (this.autoScroll) {
                                this.$refs.logBox.scrollTop =
                                    this.$refs.logBox.scrollHeight
                            }
                        })

                    }
                },

                disconnectLogs() {

                    if (this.logSource) {
                        this.logSource.close()
                        this.logSource = null
                    }
                },

                clearLogs() {
                    this.logs = []
                },

                toggleScroll() {
                    this.autoScroll = !this.autoScroll
                },

                toggleDarkMode() {

                    document.documentElement.classList.toggle('dark')

                },

                formatTime(timestamp) {

                    if (!timestamp) return "Never"

                    const date = new Date(timestamp)

                    return date.toLocaleTimeString()

                },

            }

        }

    </script>

</body>

</html>
