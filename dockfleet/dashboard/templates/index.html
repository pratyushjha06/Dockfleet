<!DOCTYPE html>
<html lang="en" x-data :class="{ 'dark': $root.darkMode }">
<head>
    <meta charset="UTF-8">
    <title>DockFleet Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine JS -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body 
    class="bg-gradient-to-br from-gray-100 to-gray-200 
           dark:from-gray-900 dark:to-gray-800 
           text-gray-900 dark:text-white 
           min-h-screen transition-all duration-300"

    x-data="dashboard()" 
    x-init="init()"
>

<div class="container mx-auto px-6 py-10">

    <!-- NAVBAR -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-10 gap-4">
        <div>
            <h1 class="text-4xl font-bold">DockFleet</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Local self-healing orchestrator
            </p>
        </div>

        <button 
            @click="toggleDarkMode()" 
            class="px-4 py-2 rounded-xl bg-gray-800 text-white 
                   dark:bg-gray-700 hover:scale-105 transition">
            Toggle Theme
        </button>
    </div>


    <!-- SUMMARY STRIP -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">

        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg">
            <p class="text-sm text-gray-500">Total Services</p>
            <p class="text-3xl font-bold mt-1" x-text="summary.total_services || 0"></p>
        </div>

        <div class="bg-green-100 dark:bg-green-900/40 p-6 rounded-2xl shadow-lg">
            <p class="text-sm">Running</p>
            <p class="text-3xl font-bold text-green-600 dark:text-green-300 mt-1"
               x-text="summary.running || 0"></p>
        </div>

        <div class="bg-red-100 dark:bg-red-900/40 p-6 rounded-2xl shadow-lg">
            <p class="text-sm">Unhealthy</p>
            <p class="text-3xl font-bold text-red-600 dark:text-red-300 mt-1"
               x-text="summary.unhealthy || 0"></p>
        </div>

    </div>


    <!-- SERVICES GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

        <template x-for="service in services" :key="service.name">
            <div class="bg-white dark:bg-gray-800 
                        p-6 rounded-2xl shadow-xl 
                        border border-gray-200 dark:border-gray-700
                        hover:shadow-2xl transition duration-300">

                <!-- Header Row -->
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold capitalize"
                        x-text="service.name"></h2>

                    <span 
                        :class="{
                            'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300': service.status === 'running',
                            'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300': service.status === 'restarting',
                            'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300': service.status === 'stopped'
                        }"
                        class="px-3 py-1 text-xs font-semibold rounded-full capitalize">
                        <span x-text="service.status"></span>
                    </span>
                </div>


                <!-- CPU Bar -->
                <div class="mb-4">
                    <p class="text-sm text-gray-500 mb-1">
                        CPU Usage (<span x-text="service.cpu"></span>%)
                    </p>
                    <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                        <div class="bg-blue-500 h-2 rounded-full transition-all duration-500"
                             :style="'width:' + service.cpu + '%'">
                        </div>
                    </div>
                </div>


                <!-- Metrics -->
                <div class="space-y-2 text-sm">
                    <p><strong>Memory:</strong> <span x-text="service.memory"></span> MB</p>
                    <p><strong>Uptime:</strong> <span x-text="service.uptime"></span></p>
                    <p><strong>Restarts:</strong> <span x-text="service.restart_count"></span></p>
                    <p>
                        <strong>Health:</strong> 
                        <span 
                            :class="{
                                'text-green-600 dark:text-green-300': service.health_status === 'healthy',
                                'text-yellow-600 dark:text-yellow-300': service.health_status === 'degraded',
                                'text-red-600 dark:text-red-300': service.health_status === 'unhealthy'
                            }"
                            class="font-semibold capitalize"
                            x-text="service.health_status">
                        </span>
                    </p>
                </div>


                <!-- Buttons -->
                <div class="mt-6 flex gap-4">
                    <button 
                        @click="restartService(service.name)"
                        class="flex-1 bg-yellow-500 text-black px-3 py-2 
                               rounded-lg hover:bg-yellow-400 transition">
                        Restart
                    </button>

                    <button 
                        @click="stopService(service.name)"
                        class="flex-1 bg-red-600 text-white px-3 py-2 
                               rounded-lg hover:bg-red-500 transition">
                        Stop
                    </button>
                </div>

            </div>
        </template>

    </div>

</div>


<!-- Alpine Script -->
<script>
function dashboard() {
    return {
        services: [],
        summary: {},
        darkMode: true,

        async fetchServices() {
            try {
                const res = await fetch('/services');
                this.services = await res.json();
            } catch (err) {
                console.error("Failed to fetch services:", err);
            }
        },

        async fetchSummary() {
            try {
                const res = await fetch('/status');
                this.summary = await res.json();
            } catch (err) {
                console.error("Failed to fetch summary:", err);
            }
        },

        async init() {
            if (this.darkMode) {
                document.documentElement.classList.add('dark');
            }
            await this.fetchServices();
            await this.fetchSummary();
        },

        restartService(name) {
            console.log("Restart clicked:", name);
        },

        stopService(name) {
            console.log("Stop clicked:", name);
        },

        toggleDarkMode() {
            this.darkMode = !this.darkMode;
            
            if (this.darkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
    }
}
</script>

</body>
</html>
