services:

  db:
    image: postgres
    restart: always
    memory: 512m
    cpus: 0.5
    environment:
      - POSTGRES_PASSWORD=example
      - POSTGRES_DB=dockfleet

  api:
    image: nginx
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DEBUG=true