self_healing: true

services:

  db:
    image: postgres:15
    restart: always
    memory: "1024m"
    cpus: "1.0"

    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: dockfleet
      POSTGRES_USER: postgres

    healthcheck:
      type: tcp
      endpoint: localhost:5432
      interval: 60

  api:
    image: nginx
    restart: always

    healthcheck:
      type: http
      endpoint: http://localhost:8080
      interval: 60

    depends_on:
      - db

    ports:
      - "8080:80"

    environment:
      DB_HOST: db
      DEBUG: "true"

  crash_test:
    image: busybox
    restart: always

    # Intentionally failing healthcheck so auto-heal + analytics are visible
    healthcheck:
      type: http
      endpoint: "http://localhost:9999/health"  # nothing listening here
      interval: 60